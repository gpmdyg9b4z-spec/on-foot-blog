name: Generate Blog Post from Transcript

on:
  push:
    paths:
      - '_transcripts/**.txt'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new or changed transcript
        id: find_transcript
        run: |
          TRANSCRIPT=$(git diff --name-only HEAD~1 HEAD -- '_transcripts/*.txt' | head -n 1)
          if [ -z "$TRANSCRIPT" ]; then
            echo "No transcript found in this push."
            exit 1
          fi
          echo "path=$TRANSCRIPT" >> $GITHUB_OUTPUT
          BASENAME=$(basename "$TRANSCRIPT" .txt)
          echo "slug=$BASENAME" >> $GITHUB_OUTPUT
          echo "Found transcript: $TRANSCRIPT (slug: $BASENAME)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate HTML post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRANSCRIPT_PATH: ${{ steps.find_transcript.outputs.path }}
          SLUG: ${{ steps.find_transcript.outputs.slug }}
        run: python .github/scripts/generate_post.py

      - name: Update index
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/update_index.py

      - name: Commit generated files
        run: |
          git config user.name "on-foot-bot"
          git config user.email "bot@on-foot-blog"
          git add _posts/ _data/ index.html
          git diff --staged --quiet || git commit -m "Generate post: ${{ steps.find_transcript.outputs.slug }}"
          git push
